<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk With God</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(145deg, #b7d9e5 0%, #e3b7a0 50%, #d4a59a 100%);
        }

        /* Painted sky background with artistic clouds */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 220, 180, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(255, 200, 150, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(180, 210, 230, 0.5) 0%, transparent 60%),
                radial-gradient(circle at 70% 20%, rgba(230, 200, 170, 0.4) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* Artistic floating clouds */
        .cloud-painting {
            position: fixed;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(3px);
            border-radius: 1000px;
            z-index: 1;
            pointer-events: none;
            filter: blur(3px);
        }

        .cloud-painting1 {
            width: 400px;
            height: 150px;
            top: 5%;
            left: -200px;
            background: linear-gradient(135deg, rgba(255, 245, 235, 0.5), rgba(255, 220, 200, 0.4));
            animation: driftCloud1 120s linear infinite;
        }

        .cloud-painting2 {
            width: 600px;
            height: 200px;
            top: 40%;
            right: -300px;
            background: linear-gradient(145deg, rgba(255, 235, 220, 0.5), rgba(230, 210, 200, 0.4));
            animation: driftCloud2 150s linear infinite;
        }

        @keyframes driftCloud1 {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 400px)); }
        }

        @keyframes driftCloud2 {
            from { transform: translateX(calc(100vw + 300px)); }
            to { transform: translateX(-600px); }
        }

        /* Warm sun glow */
        .sun-glow {
            position: fixed;
            top: 5%;
            right: 5%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 200, 150, 0.4) 0%, rgba(255, 180, 130, 0.2) 50%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1;
            animation: sunPulse 8s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Main app container */
        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            text-align: center;
            color: #4a3b2f;
            font-size: 42px;
            margin-bottom: 10px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);
        }

        h1 span {
            font-size: 16px;
            display: block;
            opacity: 0.8;
        }

        h2 {
            color: #4a3b2f;
            font-size: 28px;
            margin-bottom: 15px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            border-bottom: 2px solid rgba(230, 180, 130, 0.5);
            padding-bottom: 5px;
        }

        /* Content sections */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Cards */
        .card {
            background: rgba(255, 245, 235, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        /* Buttons */
        button {
            background: rgba(255, 245, 235, 0.7);
            backdrop-filter: blur(5px);
            color: #4a3b2f;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        button:hover {
            background: rgba(255, 235, 220, 0.9);
            transform: translateY(-2px);
        }

        button.primary {
            background: #8b6b4f;
            color: white;
            border-color: #5c3e2d;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .action-btn {
            flex: 1;
        }

        /* Bottom navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .nav-item.active {
            background: rgba(139, 107, 79, 0.3);
        }

        .nav-item i {
            display: block;
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* Forms */
        textarea, input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            background: rgba(255, 245, 235, 0.8);
            font-size: 16px;
            margin: 10px 0;
        }

        /* Answer cards */
        .answer-card {
            border-left: 5px solid #8b6b4f;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255, 245, 235, 0.5);
            border-radius: 10px;
        }

        .verse {
            font-style: italic;
            margin: 10px 0;
            padding-left: 10px;
            border-left: 2px solid #d4a59a;
        }

        .reference {
            color: #8b6b4f;
            font-weight: bold;
            text-align: right;
        }

        .guidance {
            background: rgba(255, 245, 235, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
        }

        .loading::after {
            content: '✦';
            animation: spin 2s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Mobile */
        @media (max-width: 500px) {
            .app-container { padding: 15px; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <!-- Artistic background elements -->
    <div class="cloud-painting cloud-painting1"></div>
    <div class="cloud-painting cloud-painting2"></div>
    <div class="sun-glow"></div>

    <div class="app-container">
        <h1>Walk With God <span>Your Daily Devotional</span></h1>

        <!-- Home Section -->
        <div id="homeSection" class="content-section active">
            <div class="card">
                <h2>Welcome</h2>
                <p style="font-style:italic; text-align:center; margin:20px 0;">"Your word is a lamp to my feet and a light to my path." — Psalm 119:105</p>
                <div class="action-row">
                    <button class="action-btn" onclick="showAsk()">❓ Ask</button>
                    <button class="action-btn" onclick="showReader()">📖 Read</button>
                    <button class="action-btn" onclick="showBible()">🔍 Search</button>
                </div>
            </div>
            
            <div class="card">
                <h2>Quick Answers</h2>
                <div class="action-row">
                    <button onclick="quickAnswer('salvation')">✝️ Salvation</button>
                    <button onclick="quickAnswer('anxiety')">😰 Anxiety</button>
                </div>
                <div class="action-row">
                    <button onclick="quickAnswer('forgiveness')">💝 Forgiveness</button>
                    <button onclick="quickAnswer('purpose')">🎯 Purpose</button>
                </div>
            </div>
        </div>

        <!-- Ask Section -->
        <div id="askSection" class="content-section">
            <div class="card">
                <h2>Ask a Question</h2>
                <textarea id="question" rows="3" placeholder="e.g., 'How do I get to heaven?'"></textarea>
                <button class="primary" onclick="answerQuestion()" style="width:100%;">Get Answer</button>
                <div id="answerResult"></div>
                <button onclick="showHome()" style="margin-top:20px;">← Back</button>
            </div>
        </div>

        <!-- Reader Section -->
        <div id="readerSection" class="content-section">
            <div class="card">
                <h2>Read the Bible</h2>
                <div class="action-row">
                    <button onclick="loadChapter('John', 3)">John 3</button>
                    <button onclick="loadChapter('Psalm', 23)">Psalm 23</button>
                </div>
                <div class="action-row">
                    <button onclick="loadChapter('Romans', 8)">Romans 8</button>
                    <button onclick="loadChapter('Philippians', 4)">Philippians 4</button>
                </div>
                <div id="readerContent"></div>
                <button onclick="showHome()" style="margin-top:20px;">← Back</button>
            </div>
        </div>

        <!-- Bible Section -->
        <div id="bibleSection" class="content-section">
            <div class="card">
                <h2>Search the Bible</h2>
                <input type="text" id="bibleSearch" placeholder="Enter a word (e.g., 'love')">
                <button class="primary" onclick="searchBible()" style="width:100%;">Search</button>
                <div id="bibleResult"></div>
                <button onclick="showHome()" style="margin-top:20px;">← Back</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showHome()"><i>🏠</i>Home</div>
            <div class="nav-item" onclick="showAsk()"><i>❓</i>Ask</div>
            <div class="nav-item" onclick="showReader()"><i>📖</i>Read</div>
            <div class="nav-item" onclick="showBible()"><i>🔍</i>Search</div>
        </div>
    </div>

    <script>
        // ===== NAVIGATION =====
        function showHome() {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('homeSection').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        }
        
        function showAsk() {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('askSection').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.nav-item')[1].classList.add('active');
        }
        
        function showReader() {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('readerSection').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.nav-item')[2].classList.add('active');
            document.getElementById('readerContent').innerHTML = '';
        }
        
        function showBible() {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('bibleSection').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        // ===== SALVATION ANSWER DATABASE =====
        const answers = {
            salvation: {
                title: "✝️ How to Get to Heaven",
                verses: [
                    { ref: "John 3:16", text: "For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life." },
                    { ref: "Romans 10:9-10", text: "If you declare with your mouth, 'Jesus is Lord,' and believe in your heart that God raised him from the dead, you will be saved." },
                    { ref: "Ephesians 2:8-9", text: "For it is by grace you have been saved, through faith—and this is not from yourselves, it is the gift of God—not by works, so that no one can boast." },
                    { ref: "John 14:6", text: "Jesus answered, 'I am the way and the truth and the life. No one comes to the Father except through me.'" }
                ],
                explanation: "Salvation is a free gift from God. You cannot earn it by being good enough. It is received through faith in Jesus Christ—believing that He died for your sins and rose again.",
                guidance: "If you want to receive this gift, you can pray: 'Lord Jesus, I believe you died for me and rose again. I turn from my sins and trust you as my Savior. Thank you for your gift of eternal life. Amen.'"
            },
            anxiety: {
                title: "😰 Dealing with Anxiety",
                verses: [
                    { ref: "Philippians 4:6-7", text: "Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God. And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus." },
                    { ref: "1 Peter 5:7", text: "Cast all your anxiety on him because he cares for you." },
                    { ref: "Matthew 6:25-27", text: "Therefore I tell you, do not worry about your life... Look at the birds of the air; they do not sow or reap or store away in barns, and yet your heavenly Father feeds them. Are you not much more valuable than they?" }
                ],
                explanation: "God cares about your worries. He invites you to bring them to Him in prayer and promises to give you peace in return.",
                guidance: "When you feel anxious, pause and pray. Give each worry to God, one by one. Trust that He cares for you."
            },
            forgiveness: {
                title: "💝 Forgiveness",
                verses: [
                    { ref: "Ephesians 4:31-32", text: "Get rid of all bitterness, rage and anger... Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you." },
                    { ref: "Colossians 3:13", text: "Forgive as the Lord forgave you." },
                    { ref: "Matthew 6:14-15", text: "For if you forgive other people when they sin against you, your heavenly Father will also forgive you. But if you do not forgive others their sins, your Father will not forgive your sins." }
                ],
                explanation: "We forgive because we have been forgiven. Unforgiveness hurts us more than the person who wronged us.",
                guidance: "Think about how much God has forgiven you. Ask Him to help you extend that same grace to others."
            },
            purpose: {
                title: "🎯 Finding Your Purpose",
                verses: [
                    { ref: "Jeremiah 29:11", text: "For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future." },
                    { ref: "Ephesians 2:10", text: "For we are God's handiwork, created in Christ Jesus to do good works, which God prepared in advance for us to do." },
                    { ref: "Proverbs 3:5-6", text: "Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight." }
                ],
                explanation: "God has a specific purpose for your life. You are not an accident—you are His masterpiece, created for good works.",
                guidance: "Seek God daily, trust His guidance, and look for opportunities to serve others. Your purpose unfolds as you walk with Him."
            }
        };

        function answerQuestion() {
            const question = document.getElementById('question').value.toLowerCase();
            let result = '';
            
            if (question.includes('heaven') || question.includes('salvation') || question.includes('saved') || question.includes('eternal')) {
                result = formatAnswer('salvation');
            } else if (question.includes('anxiety') || question.includes('anxious') || question.includes('worry') || question.includes('fear')) {
                result = formatAnswer('anxiety');
            } else if (question.includes('forgive') || question.includes('forgiveness') || question.includes('bitter')) {
                result = formatAnswer('forgiveness');
            } else if (question.includes('purpose') || question.includes('meaning') || question.includes('why am i here')) {
                result = formatAnswer('purpose');
            } else {
                result = '<div class="answer-card">Try asking about salvation, anxiety, forgiveness, or purpose.</div>';
            }
            
            document.getElementById('answerResult').innerHTML = result;
        }

        function quickAnswer(topic) {
            document.getElementById('answerResult').innerHTML = formatAnswer(topic);
            showAsk();
        }

        function formatAnswer(key) {
            const a = answers[key];
            let verses = '';
            a.verses.forEach(v => {
                verses += `<div class="verse">"${v.text}"<div class="reference">— ${v.ref}</div></div>`;
            });
            
            return `
                <div class="answer-card">
                    <h3>${a.title}</h3>
                    ${verses}
                    <div class="guidance">
                        <strong>Explanation:</strong> ${a.explanation}<br><br>
                        <strong>✨ Guidance:</strong> ${a.guidance}
                    </div>
                </div>
            `;
        }

        function loadChapter(book, chapter) {
            const content = document.getElementById('readerContent');
            content.innerHTML = '<p class="loading">Loading...</p>';
            
            fetch(`https://bible-api.com/${book}+${chapter}?translation=kjv`)
                .then(response => response.json())
                .then(data => {
                    let verses = '';
                    data.verses.forEach(v => {
                        verses += `<p><strong>${v.verse}</strong> ${v.text}</p>`;
                    });
                    content.innerHTML = `<h3>${book} ${chapter}</h3>${verses}`;
                })
                .catch(() => {
                    content.innerHTML = '<p>Error loading chapter</p>';
                });
        }

        function searchBible() {
            const word = document.getElementById('bibleSearch').value;
            const result = document.getElementById('bibleResult');
            result.innerHTML = '<p class="loading">Searching...</p>';
            
            fetch(`https://bible-api.com/${word}?translation=kjv`)
                .then(response => response.json())
                .then(data => {
                    let output = '';
                    if (data.verses && data.verses.length > 0) {
                        data.verses.slice(0, 5).forEach(v => {
                            output += `<p><strong>${v.book} ${v.chapter}:${v.verse}</strong><br>${v.text}</p><hr>`;
                        });
                    } else {
                        output = '<p>No verses found</p>';
                    }
                    result.innerHTML = output;
                })
                .catch(() => {
                    result.innerHTML = '<p>Error searching</p>';
                });
        }
    </script>
</body>
</html>
